spring:
  datasource:
    url: jdbc:h2:mem:tissenza_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 1000ms

jwt:
  secret: test-secret-key-for-jwt-context-load
  expiration: 86400000
