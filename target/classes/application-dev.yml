spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/tissenza_dev
    username: tissenza_user
    password: tissenza_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 60000ms

jwt:
  secret: tissenza-secret-key-dev-2026-very-long-string-for-hmac
  expiration: 86400000

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

logging:
  level:
    com.tissenza: DEBUG